## Configuracion de Instancia
server:
  port: 8082
  error:
    include-stacktrace: on_param

## Configuracion del cliente de Eureka
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    preferIpAddress: true
    hostname: ms-movies-rents

## Configuracion de Spring
spring:
  application:
    name: ms-movies-rents
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3311/movies_rents_db} #Actualizar con el valor de tu despliegue local de MySQL.
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
    username: ${DB_USER:root} #Actualizar con el valor de tu usuario.
    password: ${DB_PASSWORD:root} #Actualizar con el valor de tu contraseña de root.
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect.storage_engine: innodb
    database-platform: org.hibernate.dialect.MySQL8Dialect

## Configuracion secundaria (custom)
getMovie:
  url: http://ms-movies/movies/%s
